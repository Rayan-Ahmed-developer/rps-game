<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rock Paper Scissors</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="index.css"/>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>Rock Paper Scissors</h1>
    <p>Pick your move</p>
  </div>

  <div class="scoreboard">
    <div class="panel">
      <div class="panel-label">You</div>
      <div class="display" id="user-disp">🤜</div>
      <div class="score-num" id="user-score">0</div>
    </div>
    <div class="vs-badge">VS</div>
    <div class="panel">
      <div class="panel-label">Computer</div>
      <div class="display" id="comp-disp">🤖</div>
      <div class="score-num" id="comp-score">0</div>
    </div>
  </div>

  <div class="streak-bar" id="streak-bar"></div>

  <div class="choices">
    <button class="choice-btn" onclick="play('rock')">🪨<span class="choice-label">Rock</span></button>
    <button class="choice-btn" onclick="play('paper')">📄<span class="choice-label">Paper</span></button>
    <button class="choice-btn" onclick="play('scissors')">✂️<span class="choice-label">Scissors</span></button>
  </div>

  <div class="msg-wrap">
    <span id="msg">Choose a move to start</span>
  </div>

  <div class="reset-wrap">
    <button class="reset-btn" onclick="reset()">↺ Reset scores</button>
  </div>

</div>
<script src="app.js"></script>
</body>
</html>
